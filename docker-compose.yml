services:
  web:
    image: node:22
    working_dir: /app
    tty: true
    stdin_open: true
    env_file:
      - .env
    ports:
      - "5173:5173"
      - "5001:5001"
      - "9000-9010:9000-9010"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    command: >
      sh -c "if [ -f package-lock.json ]; then npm ci; else npm install; fi && (npm run functions:serve & npm run dev)"

volumes:
  node_modules:
